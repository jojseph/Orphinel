<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Orphinel — A new paradigm in language design. Code. Compile. Create.">
  <title>Orphinel — Meet the Language</title>

  <!-- CSS: tokens → reset → base → components -->
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components/cursor.css">
  <link rel="stylesheet" href="assets/css/components/nav.css">
  <link rel="stylesheet" href="assets/css/components/hero.css">
  <link rel="stylesheet" href="assets/css/components/buttons.css">
  <link rel="stylesheet" href="assets/css/components/terminal.css">
  <link rel="stylesheet" href="assets/css/components/status-bar.css">
  <link rel="stylesheet" href="assets/css/components/overlays.css">

  <style>
    /* Landing page uses custom cursor */
    html,
    body {
      cursor: none;
    }
  </style>
</head>

<body>

  <canvas id="three"></canvas>

  <!-- Overlays -->
  <div class="scanlines"></div>
  <div class="noise"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Custom Cursor -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Navigation -->
  <nav>
    <div class="nav-logo"><span></span>Orphinel</div>
    <ul class="nav-links">
      <li><a href="#">Docs</a></li>
      <li><a href="#">GitHub</a></li>
    </ul>
    <div class="nav-badge">v0.1.0 — Alpha</div>
  </nav>

  <!-- Hero -->
  <main id="ui">
    <div class="hero-content">
      <div class="overline">A new paradigm in language design</div>
      <h1>Meet<br><em>Orphinel.</em></h1>
      <p class="subheadline"><strong>Code.</strong> Compile. <strong>Create.</strong></p>
      <div class="cta-wrap">
        <a href="#" class="btn-primary"><span>Open Compiler</span></a>
        <a href="#" class="btn-secondary">
          Read the docs
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M1 7h12M7 1l6 6-6 6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </a>
      </div>
    </div>
  </main>

  <!-- Terminal Panel -->
  <div id="terminal">
    <div class="term-header">
      <span class="term-title">orphinel compiler — output</span>
      <div class="term-controls">
        <div class="term-dot"></div>
        <div class="term-dot"></div>
        <div class="term-dot"></div>
      </div>
    </div>
    <div class="term-body">
      <ul id="term-log"></ul>
    </div>
  </div>

  <!-- Status Bar -->
  <footer class="status-bar">
    <div class="status-left">
      <span class="status-dot">System Online</span>
      <span>Parser v3.2.1</span>
    </div>
    <div class="status-right">
      <span>Interactive — hover to explore</span>
      <span>Three.js r158</span>
    </div>
  </footer>

  <!-- JS: import map for Three.js CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ── Cursor ──
    const cursor = document.getElementById('cursor');
    const cursorRing = document.getElementById('cursor-ring');
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let cx = mx, cy = my, rx = mx, ry = my;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top = my + 'px';
    });

    document.addEventListener('mousedown', () => {
      cursor.classList.add('clicking');
      cursorRing.classList.add('clicking');
    });

    document.addEventListener('mouseup', () => {
      cursor.classList.remove('clicking');
      cursorRing.classList.remove('clicking');
    });

    function animateCursor() {
      rx += (mx - rx) * 0.1;
      ry += (my - ry) * 0.1;
      cursorRing.style.left = rx + 'px';
      cursorRing.style.top = ry + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // ── Three.js ──
    const canvas = document.getElementById('three');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000, 1);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 7);

    // Mouse tracking (normalized)
    const mouse = new THREE.Vector2();
    const targetMouse = new THREE.Vector2();
    document.addEventListener('mousemove', e => {
      targetMouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
      targetMouse.y = -(e.clientY / window.innerHeight - 0.5) * 2;
    });

    // ── Lighting ──
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.08);
    scene.add(ambientLight);

    const spotLight1 = new THREE.SpotLight(0xffffff, 120);
    spotLight1.position.set(6, 8, 6);
    spotLight1.angle = Math.PI / 6;
    spotLight1.penumbra = 0.4;
    scene.add(spotLight1);

    const spotLight2 = new THREE.SpotLight(0xffffff, 60);
    spotLight2.position.set(-6, -4, 4);
    spotLight2.angle = Math.PI / 5;
    spotLight2.penumbra = 0.6;
    scene.add(spotLight2);

    const pointLight = new THREE.PointLight(0xffffff, 8, 12);
    pointLight.position.set(0, 0, 3);
    scene.add(pointLight);

    // ── Core Group ──
    const coreGroup = new THREE.Group();
    scene.add(coreGroup);

    // Materials
    const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
    const solidMat = new THREE.MeshStandardMaterial({
      color: 0x000000, metalness: 0.0, roughness: 0.05, emissive: 0x111111,
    });

    // ── Central Monolith ──
    const monolithGeo = new THREE.BoxGeometry(1.6, 2.4, 1.6, 4, 4, 4);
    const monolithSolid = new THREE.Mesh(monolithGeo, solidMat.clone());
    const monolithWire = new THREE.Mesh(monolithGeo, wireMat.clone());
    monolithWire.material.opacity = 0.12;
    monolithWire.material.transparent = true;
    coreGroup.add(monolithSolid);
    coreGroup.add(monolithWire);

    const posAttr = monolithGeo.attributes.position;
    const origPositions = new Float32Array(posAttr.array);

    // ── Floating Satellite Cubes ──
    const satellites = [];
    const satelliteCount = 8;
    const satGeo = new THREE.BoxGeometry(1, 1, 1);
    const satEdgesGeo = new THREE.EdgesGeometry(satGeo);

    for (let i = 0; i < satelliteCount; i++) {
      const angle = (i / satelliteCount) * Math.PI * 2;
      const radius = 2.8 + Math.random() * 0.6;
      const yOff = (Math.random() - 0.5) * 2.5;
      const scale = 0.35 + Math.random() * 0.3;

      const group = new THREE.Group();
      group.position.set(Math.cos(angle) * radius, yOff, Math.sin(angle) * radius * 0.5);
      group.scale.setScalar(scale);

      group.add(new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), solidMat.clone()));
      group.add(new THREE.LineSegments(satEdgesGeo, new THREE.LineBasicMaterial({ color: 0xffffff })));
      coreGroup.add(group);

      satellites.push({
        group, baseAngle: angle, radius, yOff,
        speed: 0.2 + Math.random() * 0.4,
        rotSpeed: new THREE.Vector3(
          (Math.random() - 0.5) * 0.8, (Math.random() - 0.5) * 0.8, (Math.random() - 0.5) * 0.5
        ),
        phase: Math.random() * Math.PI * 2,
        baseScale: scale,
        driftSpeed1: 0.15 + Math.random() * 0.25,
        driftSpeed2: 0.08 + Math.random() * 0.15,
        driftPhase1: Math.random() * Math.PI * 2,
        driftPhase2: Math.random() * Math.PI * 2,
        driftAmount: 0.4 + Math.random() * 0.6,
      });
    }

    // ── Connection Lines ──
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.08, transparent: true });
    const connectionLines = [];

    for (let i = 0; i < satelliteCount; i++) {
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
      const line = new THREE.Line(geo, lineMaterial.clone());
      scene.add(line);
      connectionLines.push(line);
    }

    // ── Background Grid ──
    const gridHelper = new THREE.GridHelper(30, 30, 0x1a1a1a, 0x111111);
    gridHelper.position.y = -4;
    gridHelper.material.opacity = 0.4;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // ── Particle Field ──
    const particleCount = 280;
    const pGeo = new THREE.BufferGeometry();
    const pPositions = new Float32Array(particleCount * 3);
    const pSizes = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
      pPositions[i * 3] = (Math.random() - 0.5) * 22;
      pPositions[i * 3 + 1] = (Math.random() - 0.5) * 16;
      pPositions[i * 3 + 2] = (Math.random() - 0.5) * 14 - 4;
      pSizes[i] = Math.random() * 1.8 + 0.4;
    }

    pGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
    pGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));

    const pMat = new THREE.PointsMaterial({
      color: 0xffffff, size: 0.04, sizeAttenuation: true, opacity: 0.35, transparent: true,
    });
    const particles = new THREE.Points(pGeo, pMat);
    scene.add(particles);

    // ── Rings ──
    const ringGeo = new THREE.TorusGeometry(2.2, 0.008, 4, 80);
    const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.25, transparent: true }));
    ring.rotation.x = Math.PI / 2.5;
    coreGroup.add(ring);

    const ring2 = new THREE.Mesh(
      new THREE.TorusGeometry(1.6, 0.005, 4, 60),
      new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.12, transparent: true })
    );
    ring2.rotation.x = Math.PI / 3.2;
    ring2.rotation.z = 0.4;
    coreGroup.add(ring2);

    // ── Interaction State ──
    let isClicking = false;
    let holdSpeed = 0;

    // ── Terminal ──
    const terminal = document.getElementById('terminal');
    const termLog = document.getElementById('term-log');
    let termTimer = null;
    let termHideTimer = null;
    let termRunning = false;

    const LOG_SEQUENCES = [
      [
        { delay: 0, text: '<span class="tag">[INIT]</span>      orphinel runtime v0.1.0 loaded', },
        { delay: 120, text: '<span class="tag">[PARSE]</span>     scanning token stream<span class="dim"> ············</span> <span class="ok">done</span>' },
        { delay: 280, text: '<span class="tag">[PARSE]</span>     resolving symbol table — <span class="warn">312 tokens</span>' },
        { delay: 460, text: '<span class="tag">[TYPECHECK]</span> inferring types<span class="dim"> ················</span> <span class="ok">pass</span>' },
        { delay: 620, text: '<span class="tag">[LINK]</span>      binding 3 modules — core · std · user' },
        { delay: 820, text: '<span class="tag">[CODEGEN]</span>   emitting IR for target <span class="warn">orphin-vm/x64</span>' },
        { delay: 1050, text: '<span class="tag">[CODEGEN]</span>   optimising passes: DCE · inlining · CSE' },
        { delay: 1280, text: '<span class="tag">[EMIT]</span>      writing bytecode<span class="dim"> ···············</span> <span class="ok">1.4 kb</span>' },
        { delay: 1480, text: '<span class="tag">[BUILD]</span>     <span class="ok">✓ compiled successfully in 147ms</span><span class="term-cursor"></span>' },
      ],
      [
        { delay: 0, text: '<span class="tag">[INIT]</span>      re-entry detected — hot reload' },
        { delay: 140, text: '<span class="tag">[PARSE]</span>     diffing AST<span class="dim"> ····················</span> <span class="ok">2 changed</span>' },
        { delay: 320, text: '<span class="tag">[TYPECHECK]</span> re-checking delta scope<span class="dim"> ·········</span> <span class="ok">pass</span>' },
        { delay: 500, text: '<span class="tag">[LINK]</span>      incremental link — skipping 2 modules' },
        { delay: 700, text: '<span class="tag">[CODEGEN]</span>   patching IR blocks: 4 affected' },
        { delay: 900, text: '<span class="tag">[EMIT]</span>      delta bytecode<span class="dim"> ·················</span> <span class="ok">0.3 kb</span>' },
        { delay: 1060, text: '<span class="tag">[BUILD]</span>     <span class="ok">✓ incremental build OK in 62ms</span><span class="term-cursor"></span>' },
      ],
      [
        { delay: 0, text: '<span class="tag">[INIT]</span>      spawning worker thread #3' },
        { delay: 150, text: '<span class="tag">[PARSE]</span>     tokenising<span class="dim"> ·····················</span> <span class="ok">done</span>' },
        { delay: 310, text: '<span class="tag">[PARSE]</span>     constructing AST — depth <span class="warn">14</span>' },
        { delay: 480, text: '<span class="tag">[TYPECHECK]</span> <span class="warn">warning:</span> implicit coercion at line 42' },
        { delay: 650, text: '<span class="tag">[TYPECHECK]</span> all constraints satisfied<span class="dim"> ·········</span> <span class="ok">ok</span>' },
        { delay: 830, text: '<span class="tag">[LINK]</span>      resolving extern "math.orphin"' },
        { delay: 1020, text: '<span class="tag">[CODEGEN]</span>   vectorising loops: 3 / 3 eligible' },
        { delay: 1240, text: '<span class="tag">[EMIT]</span>      stripping debug symbols<span class="dim"> ··········</span> <span class="ok">done</span>' },
        { delay: 1430, text: '<span class="tag">[BUILD]</span>     <span class="ok">✓ release build complete in 209ms</span><span class="term-cursor"></span>' },
      ],
    ];

    let seqIndex = 0;

    function runTerminal() {
      if (termRunning) return;
      termRunning = true;

      clearTimeout(termHideTimer);
      termLog.innerHTML = '';
      terminal.classList.add('visible');

      const seq = LOG_SEQUENCES[seqIndex % LOG_SEQUENCES.length];
      seqIndex++;

      seq.forEach(({ delay, text }) => {
        const t = setTimeout(() => {
          const li = document.createElement('li');
          li.innerHTML = text;
          termLog.appendChild(li);
          requestAnimationFrame(() => requestAnimationFrame(() => li.classList.add('show')));
          li.scrollIntoView({ block: 'nearest' });
        }, delay);
        if (!termTimer) termTimer = [];
        termTimer.push(t);
      });

      const totalDuration = seq[seq.length - 1].delay + 2200;
      termHideTimer = setTimeout(() => {
        terminal.classList.remove('visible');
        termRunning = false;
        termTimer = null;
        // Redirect to editor page after animation finishes
        setTimeout(() => { window.location.href = 'pages/editor.html'; }, 400);
      }, totalDuration);
    }

    document.addEventListener('mousedown', () => { isClicking = true; });

    // Open terminal only via "Open Compiler" button
    document.querySelector('.btn-primary').addEventListener('click', (e) => {
      e.preventDefault();
      runTerminal();
    });
    document.addEventListener('mouseup', () => { isClicking = false; });

    // ── Resize ──
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Animation ──
    const clock = new THREE.Clock();
    const _satWorldPos = new THREE.Vector3();
    const _monolithWorldPos = new THREE.Vector3();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Smooth mouse
      mouse.x += (targetMouse.x - mouse.x) * 0.06;
      mouse.y += (targetMouse.y - mouse.y) * 0.06;

      // Hold speed
      if (isClicking) { holdSpeed += (1 - holdSpeed) * 0.04; }
      else { holdSpeed *= 0.93; }
      const speedMul = 1 + holdSpeed * 4;

      // Core group rotation
      coreGroup.rotation.y += (mouse.x * 0.6 - coreGroup.rotation.y) * 0.05;
      coreGroup.rotation.x += (-mouse.y * 0.35 - coreGroup.rotation.x) * 0.05;
      coreGroup.rotation.y += 0.003 * speedMul;

      // Monolith vertex morphing
      const pos = monolithGeo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const ox = origPositions[i * 3];
        const oy = origPositions[i * 3 + 1];
        const oz = origPositions[i * 3 + 2];
        const len = Math.sqrt(ox * ox + oy * oy + oz * oz);
        const noise = Math.sin(t * 1.2 * speedMul + ox * 2.1 + oy * 1.8) * 0.06;
        pos.setXYZ(i, ox + (ox / len) * noise, oy + (oy / len) * noise * 0.7, oz + (oz / len) * noise);
      }
      pos.needsUpdate = true;
      monolithGeo.computeVertexNormals();

      monolithSolid.scale.setScalar(1);
      monolithWire.scale.setScalar(1.02);

      // Satellites
      satellites.forEach((s, i) => {
        const angle = s.baseAngle + t * s.speed * 0.3 * speedMul;
        const drift = 1 + s.driftAmount * (1 + holdSpeed * 2.5) * (
          Math.sin(t * s.driftSpeed1 * speedMul + s.driftPhase1) * 0.5 +
          Math.sin(t * s.driftSpeed2 * speedMul + s.driftPhase2) * 0.5
        );
        const r = s.radius * drift;
        s.group.position.x = Math.cos(angle) * r;
        s.group.position.z = Math.sin(angle) * r * 0.5;
        s.group.position.y = s.yOff + Math.sin(t * 0.5 * speedMul + s.phase) * 0.3;
        s.group.rotation.x += s.rotSpeed.x * 0.01 * speedMul;
        s.group.rotation.y += s.rotSpeed.y * 0.01 * speedMul;
        s.group.rotation.z += s.rotSpeed.z * 0.01 * speedMul;
        s.group.scale.setScalar(s.baseScale);

        // Connection lines
        const line = connectionLines[i];
        const lp = line.geometry.attributes.position;
        s.group.getWorldPosition(_satWorldPos);
        monolithSolid.getWorldPosition(_monolithWorldPos);
        lp.setXYZ(0, _monolithWorldPos.x, _monolithWorldPos.y, _monolithWorldPos.z);
        lp.setXYZ(1, _satWorldPos.x, _satWorldPos.y, _satWorldPos.z);
        lp.needsUpdate = true;
        line.material.opacity = 0.25 + holdSpeed * 0.25;
      });

      // Rings
      ring.rotation.z = t * 0.15 * speedMul;
      ring2.rotation.z = -t * 0.25 * speedMul;
      ring.material.opacity = 0.15 + holdSpeed * 0.25;

      // Particles
      particles.rotation.y = t * 0.015 * speedMul;
      particles.rotation.x = t * 0.006 * speedMul;

      // Point light
      pointLight.position.x = mouse.x * 3;
      pointLight.position.y = mouse.y * 3;
      pointLight.intensity = 8 + holdSpeed * 20;

      gridHelper.material.opacity = 0.35;
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>

</html>
